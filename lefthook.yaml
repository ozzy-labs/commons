commit-msg:
  commands:
    commitlint:
      run: npx commitlint --edit {1}

pre-commit:
  parallel: true
  commands:
    shellcheck:
      glob: "*.sh"
      run: mise x -- shellcheck {staged_files}
    shfmt:
      glob: "*.sh"
      run: mise x -- shfmt -w {staged_files}
      stage_fixed: true
    markdownlint:
      glob: "*.md"
      run: mise x -- markdownlint-cli2 {staged_files}
    yamlfmt:
      glob: "*.{yaml,yml}"
      run: mise x -- yamlfmt {staged_files}
      stage_fixed: true
    yamllint:
      glob: "*.{yaml,yml}"
      run: mise x -- yamllint -c .yamllint.yaml {staged_files}
    gitleaks:
      run: mise x -- gitleaks protect --staged --no-banner
